services:
  grafana:
    image: grafana/grafana:12.4.2
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ../lgtm_volume/grafana:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:v3.10.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./yamls/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../lgtm_volume/prometheus:/prometheus
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.7.1
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ../lgtm_volume/loki:/loki
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./yamls/tempo.yaml:/etc/tempo.yaml
      - ../lgtm_volume/tempo:/tmp/tempo
    ports:
      - "3200:3200"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./yamls/otel-config.yaml:/etc/otel-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - prometheus
      - loki
      - tempo

  # ─── Agents ───
  agent-orchestrator:
    build: ./agent
    env_file:
      - .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=agent-orchestrator
      - AGENT_TYPE=orchestrator
      - SEARCH_AGENT_URL=http://agent-search:8000
      - SUMMARIZER_AGENT_URL=http://agent-summarizer:8000
      - CODER_AGENT_URL=http://agent-coder:8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      agent-search:
        condition: service_healthy
      agent-summarizer:
        condition: service_healthy
      agent-coder:
        condition: service_healthy
      otel-collector:
        condition: service_started

  agent-search:
    build: ./agent
    env_file:
      - .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=agent-search
      - AGENT_TYPE=search
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - otel-collector

  agent-summarizer:
    build: ./agent
    env_file:
      - .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=agent-summarizer
      - AGENT_TYPE=summarizer
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - otel-collector

  agent-coder:
    build: ./agent
    env_file:
      - .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=agent-coder
      - AGENT_TYPE=coder
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - otel-collector

  # ─── Traffic Generator ───
  loadgen:
    build: ./loadgen
    environment:
      - ORCHESTRATOR_URL=http://agent-orchestrator:8000
      - INTERVAL=8
      - MAX_DURATION=300
    depends_on:
      agent-orchestrator:
        condition: service_healthy

