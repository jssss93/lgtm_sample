apiVersion: 1

groups:
  - orgId: 1
    name: agent-alerts
    folder: Agent Alerts
    interval: 1m
    rules:
      # 1. Cost spike — 5분간 비용이 $0.05 초과
      - uid: cost-spike
        title: "Cost Spike Alert"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(llm_cost_usd_total[5m])
              instant: true
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.05]
        for: 0s
        annotations:
          summary: "LLM cost spike detected: >$0.05 in 5 minutes"
        labels:
          severity: warning

      # 2. High error rate — 에러율 10% 초과
      - uid: high-error-rate
        title: "High Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (rate(agent_error_count_total[5m]) / rate(agent_run_count_total[5m])) * 100 > 10
              instant: true
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 2m
        annotations:
          summary: "Agent error rate exceeds 10%"
        labels:
          severity: critical

      # 3. Rate limit — 429 에러 발생
      - uid: rate-limit-hit
        title: "AOAI Rate Limit (429)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(llm_rate_limit_count_total[5m])
              instant: true
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 0s
        annotations:
          summary: "AOAI rate limit (429) detected"
        labels:
          severity: warning

      # 4. High latency — P95 > 10s
      - uid: high-latency
        title: "High LLM Latency (P95 > 10s)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, rate(llm_call_duration_seconds_bucket[5m]))
              instant: true
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
        for: 2m
        annotations:
          summary: "LLM P95 latency exceeds 10 seconds"
        labels:
          severity: warning
